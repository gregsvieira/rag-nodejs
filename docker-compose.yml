services:
  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    container_name: qdrant
    ports:
      - 6333:6333
    volumes:
      - ./data/qdrant:/qdrant/storage

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - 11434:11434
    volumes:
      - ./data/ollama_data:/root/.ollama
    restart: unless-stopped
    tty: true
